<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>CSS 布局</title>
</head>
<style>
    .tagStayle1 {
        height: max-content;
        width: max-content;
        margin: 5px;
        padding: 3px 10px 3px 10px;
        border-radius: 6px;
    }

    #content1 {
        display: flex;
        flex-wrap: wrap;
        width: auto;
        height: max-content;
        justify-content: center;
        text-decoration: blue 3px;
    }
 </style>

<body>
    <div id="content1"></div>
    <script>
        //创建数组
        var arr = ["b", "big", "i", "small", "tt",
            "abbr", "acronym", "cite", "code", "dfn", "em", "kbd", "strong", "samp", "var",
            "a", "bdo", "br", "img", "map", "object", "q", "script", "span", "sub", "sup",
            "button", "input", "label", "select", "textarea",];
        //创建div元素
        for (i = 0; i < arr.length; i++) {
            var e = document.createElement("div");
            //给元素添加class以获取样式
            e.classList.add("tagStayle1");
            //给元素添加内容
            e.textContent = arr[i];
            //创建颜色,HSV通常表示为圆锥形，
            //hue 圆锥的弧长
            //SATURATION 圆锥的半径
            //LIGHTNESS 圆锥的高
            //ALPHA 透明度
            var h = Math.floor(Math.random() * 360);
            var s = Math.floor(Math.random() * 80);
            s = s < 30 ? 50 + 0.5 * s : s;
            var l = Math.floor(Math.random() * 80);
            l = l < 40 ? 40 + 0.5 * l : l;
            var a = Math.floor(Math.random() * 80);
            a = a < 30 ? 50 + 0.5 * a : a
            var hsla = "hsla" + "(" + h + "," + s + "%" + "," + l + "%" + "," + a + "%" + ")";
            e.style.background = hsla;
            document.getElementById("content1").appendChild(e);
        }
    </script>

</body>

</html>
