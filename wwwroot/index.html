<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>withyzu_note</title>
    <base href="/" />
</head>

<body>

    <!-- loading indicator -->
    <!-- modify these files to change the loading animation -->

    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script type="text/javascript" src="libs/opensilver.js"></script>
    <script type="text/javascript" src="BlazorLoader.js"></script>
    <script type="text/javascript">
        (function (l) {
            if (l.search) {
                var q = {};
                l.search.slice(1).split('&').forEach(function (v) {
                    var a = v.split('=');
                    q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
                });
                if (q.p !== undefined) {
                    window.history.replaceState(null, null,
                        l.pathname.slice(0, -1) + (q.p || '') +
                        (q.q ? ('?' + q.q) : '') +
                        l.hash
                    );
                }
            }
        }(window.location))
    </script>
    <!-- End Single Page Apps for GitHub Pages -->

    <!-- Temporary polyfill for IE support -->
    <script src="https://cdn.polyfill.io/v2/polyfill.min.js?features=Promise,fetch"></script>

    <script src="/_framework/Blazor.Host.min.js" main="MicroApp.dll"></script>
</body>

</html>
