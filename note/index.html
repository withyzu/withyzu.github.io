<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的笔记</title>

    <link href="/favicon.ico" rel="shortcut icon" />
    <link
      href="/Asset//iconfont/iconfont.css"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="/css/highlight-atom-one-dark.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <link href="/css/general.css" rel="stylesheet" type="text/css" />
    <link href="/css/note.css" rel="stylesheet" type="text/css" />

    <script src="/js//marked.umd.js"></script>
    <script src="/js/marked-custom-render.js " type="text/javascript"></script>
    <script src="/js//highlight.min.js"></script>
    <script src="/js/jquery.min.js"></script>
    <script src="/js/general.js"></script>
    <script src="/js/note.js" type="text/javascript"></script>
  </head>

  <body>
    <div id="grid-layout">
      <div id="header"></div>

      <div id="outline">
        <div id="combobox" onclick="combobox_onclick()">
          <h1>笔记列表</h1>
        </div>
        <div id="note-list"></div>
      </div>
      <div id="split-line"></div>

      <div id="main">
        <div id="note-content">
          <div id="content-title">
            <h1></h1>
            <span></span>
          </div>
          <div id="content"></div>
          <a class="content-foot"></a>
        </div>

        <div id="fix-tool">
          <a id="to-top" href="#content-title">
            <i class="fix-i">🌵</i>
          </a>
          <a id="outline-display" onclick="outline_display_onclick()">
            <i class="fix-i">📄</i>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
